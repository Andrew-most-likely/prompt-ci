name: prompt-drift self-test

on:
  push:
    branches: [master]
  pull_request:

jobs:
  prompt-regression:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install prompt-drift (local)
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest

      - name: Run mock regression tests
        run: prompt-drift check --config test-mock.yaml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check prompt_ci/

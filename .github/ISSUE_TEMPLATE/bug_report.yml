name: Bug Report
description: Something is broken
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the fields below.

  - type: input
    id: version
    attributes:
      label: prompt-drift version
      placeholder: "0.1.1"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.11.4"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "macOS 14, Ubuntu 22.04, Windows 11"
    validations:
      required: true

  - type: dropdown
    id: provider
    attributes:
      label: Provider
      options:
        - anthropic
        - openai
        - mock
        - N/A

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, what actually happened?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. prompt-ci.yaml config used
        2. Command run
        3. Full error output
    validations:
      required: true

  - type: textarea
    id: config
    attributes:
      label: prompt-ci.yaml (remove any sensitive values)
      render: yaml
